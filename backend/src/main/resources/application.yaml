spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/committr}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # Avoid hanging requests for minutes when Redis is unreachable (every API hit checks session).
      connect-timeout: 2s
      timeout: 2s

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

security:
  encryption-key: ${ENCRYPTION_KEY}

committr:
  session:
    ttl: 30m
    cookie-name: sessionId
    # Set true temporarily to verify Redis from the app (KEYS * should include test).
    redis-startup-test: false
    cookie-secure: ${SESSION_COOKIE_SECURE:false}
    cookie-same-site: Lax
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"


github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/callback}
    scope: "${GITHUB_OAUTH_SCOPE:read:user repo}"
    # GitHub REST API requires a User-Agent; see https://docs.github.com/en/rest/using-the-rest-api/getting-started-with-the-rest-api#user-agent
    user-agent: ${GITHUB_OAUTH_USER_AGENT:Committr-Backend}
    authorize-url: ${GITHUB_OAUTH_AUTHORIZE_URL:https://github.com/login/oauth/authorize}
    access-token-url: ${GITHUB_OAUTH_ACCESS_TOKEN_URL:https://github.com/login/oauth/access_token}
    user-api-url: ${GITHUB_OAUTH_USER_API_URL:https://api.github.com/user}